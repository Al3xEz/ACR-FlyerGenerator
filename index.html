<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>ACR Flyer Generator</title>

    <link rel="stylesheet" href="dist/styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  </head>

  <body class="flex justify-center items-start min-h-screen p-10 bg-slate-300">
    <!-- ═══════════════════════════════════════════════════════
     FLYER  1080 × 1350 px
═══════════════════════════════════════════════════════ -->
    <div
      id="flyer"
      class="relative w-[1080px] h-[1350px] overflow-hidden bg-navy shrink-0 font-sans"
    >
      <!-- ══════════════════════════════
       SECCIÓN SUPERIOR — FOTO
  ══════════════════════════════ -->
      <div class="relative w-[1080px] h-[620px] overflow-hidden bg-navy">
        <!-- Hero image del torneo -->
        <img
          id="hero-img"
          class="w-full h-full object-cover object-[center_25%]"
          src=""
          alt=""
        />

        <!-- Caja del QR — arriba a la derecha -->
        <div
          class="absolute bottom-[26px] right-[28px] w-[192px] rounded-[14px] overflow-hidden bg-navy/90"
          style="box-shadow: 0 4px 24px rgba(0, 0, 0, 0.5)"
        >
          <!-- Banda de acento -->
          <div
            id="qr-header"
            class="accent-bg py-[9px] px-[10px] text-center text-[12.5px] font-extrabold tracking-wider text-white"
          >
            ¡INSCRÍBETE AQUÍ!
          </div>

          <!-- QR -->
          <div
            class="mx-[10px] mt-[10px] mb-[8px] bg-white rounded-md leading-none flex justify-center p-1"
          >
            <div id="qr-code"></div>
          </div>

          <!-- Escanea el QR -->
          <div
            class="flex items-center justify-center gap-[6px] px-[10px] pt-[6px] pb-[11px]"
          >
            <svg
              width="13"
              height="13"
              viewBox="0 0 512 512"
              fill="none"
              stroke="rgba(160,175,210,0.9)"
              stroke-width="44"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <rect x="128" y="16" width="256" height="480" rx="52" />
              <line x1="192" y1="440" x2="320" y2="440" />
            </svg>
            <span
              class="text-[11px] font-semibold tracking-[0.09em]"
              style="color: rgba(160, 175, 210, 0.9)"
            >
              ESCANEA EL QR
            </span>
          </div>
        </div>
        <!-- /qr box -->
      </div>
      <!-- /foto -->

      <!-- ══════════════════════════════
       SECCIÓN INFERIOR — CONTENIDO
  ══════════════════════════════ -->
      <div class="relative w-[1080px] h-[730px] overflow-hidden bg-[#F7F8FC]">
        <!-- Puntos decorativos — izquierda -->
        <svg
          class="absolute top-[90px] left-[18px] opacity-20 pointer-events-none"
          width="44"
          height="130"
          fill="none"
        >
          <g class="accent-fill">
            <circle cx="8" cy="8" r="3" />
            <circle cx="28" cy="8" r="3" />
            <circle cx="8" cy="28" r="3" />
            <circle cx="28" cy="28" r="3" />
            <circle cx="8" cy="48" r="3" />
            <circle cx="28" cy="48" r="3" />
            <circle cx="8" cy="68" r="3" />
            <circle cx="28" cy="68" r="3" />
            <circle cx="8" cy="88" r="3" />
            <circle cx="28" cy="88" r="3" />
            <circle cx="8" cy="108" r="3" />
            <circle cx="28" cy="108" r="3" />
            <circle cx="8" cy="128" r="3" />
            <circle cx="28" cy="128" r="3" />
          </g>
        </svg>

        <!-- Puntos decorativos — derecha -->
        <svg
          class="absolute top-[90px] right-[18px] opacity-20 pointer-events-none"
          width="44"
          height="130"
          fill="none"
        >
          <g class="accent-fill">
            <circle cx="8" cy="8" r="3" />
            <circle cx="28" cy="8" r="3" />
            <circle cx="8" cy="28" r="3" />
            <circle cx="28" cy="28" r="3" />
            <circle cx="8" cy="48" r="3" />
            <circle cx="28" cy="48" r="3" />
            <circle cx="8" cy="68" r="3" />
            <circle cx="28" cy="68" r="3" />
            <circle cx="8" cy="88" r="3" />
            <circle cx="28" cy="88" r="3" />
            <circle cx="8" cy="108" r="3" />
            <circle cx="28" cy="108" r="3" />
            <circle cx="8" cy="128" r="3" />
            <circle cx="28" cy="128" r="3" />
          </g>
        </svg>

        <!-- Columna principal -->
        <div class="px-16 pt-[52px] pb-[26px] h-full flex flex-col">
          <!-- TÍTULO -->
          <div class="leading-none tracking-tighter text-center">
            <div id="title-line1" class="font-black text-navy"></div>
            <div id="title-line2" class="font-black accent"></div>
          </div>

          <!-- Divisor con corona -->
          <div class="flex items-center gap-4 my-4">
            <div class="accent-divider flex-1 h-[2px] rounded-full"></div>
            <svg
              id="crown-icon"
              class="accent-fill shrink-0"
              width="26"
              height="26"
              viewBox="0 0 512 512"
              fill="none"
              stroke-width="36"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M477.518 181.966a25 25 0 0 1-34.91 23l-62.29 150.26h-248.92l-62.24-150.19a25 25 0 1 1 9.73-7.29l87 71.2 20.92-126.4a25 25 0 1 1 14.7-1.85l54.31 117 54.42-117.3a25 25 0 1 1 14.58 2.08l20.93 126.42 87.26-71.3a25 25 0 1 1 44.51-15.63zm-71.66 241.25h-300v60h300v-60zm-27.75-52h-244.22v36h244.22v-36z"
              />
            </svg>
            <div class="accent-divider flex-1 h-[2px] rounded-full"></div>
          </div>

          <!-- Subtítulo -->
          <p
            id="subtitle"
            class="text-[23px] text-[#3D4A5C] text-center mb-[22px] leading-snug font-normal"
          ></p>

          <!-- TARJETA DE INFO -->
          <div
            class="border border-[#DDE1EE] rounded-[20px] bg-white overflow-hidden mb-5"
          >
            <div class="grid grid-cols-2 grid-rows-2 h-full">
              <!-- Fecha y Hora -->
              <div
                class="px-[26px] py-[22px] border-r border-b border-[#E8EBF4]"
              >
                <div class="flex gap-4">
                  <svg
                    class="shrink-0"
                    width="56"
                    height="56"
                    viewBox="0 0 512 512"
                    fill="none"
                    stroke-width="32"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <rect
                      fill="none"
                      strokeLinejoin="round"
                      class="stroke-navy"
                      strokeWidth="32"
                      x="48"
                      y="80"
                      width="416"
                      height="384"
                      rx="48"
                    />
                    <circle class="fill-navy" cx="296" cy="232" r="24" />
                    <circle class="fill-navy" cx="376" cy="232" r="24" />
                    <circle class="fill-navy" cx="296" cy="312" r="24" />
                    <circle class="fill-navy" cx="376" cy="312" r="24" />
                    <circle class="fill-navy" cx="136" cy="312" r="24" />
                    <circle class="fill-navy" cx="216" cy="312" r="24" />
                    <circle class="fill-navy" cx="136" cy="392" r="24" />
                    <circle class="fill-navy" cx="216" cy="392" r="24" />
                    <circle class="fill-navy" cx="296" cy="392" r="24" />
                    <path
                      fill="none"
                      strokeLinejoin="round"
                      class="stroke-navy"
                      strokeWidth="32"
                      strokeLinecap="round"
                      d="M128 48v32M384 48v32"
                    />
                    <path
                      fill="none"
                      strokeLinejoin="round"
                      class="stroke-navy"
                      strokeWidth="32"
                      d="M464 160H48"
                    />
                  </svg>

                  <div>
                    <span
                      class="accent text-[18px] font-semibold tracking-[0.07em]"
                      >FECHA Y HORA</span
                    >
                    <div
                      id="val-fecha"
                      class="text-[22px] font-semibold text-navy leading-snug"
                    ></div>
                  </div>
                </div>
              </div>

              <!-- Ritmo / Modalidad -->
              <div class="px-[26px] py-[22px] border-b border-[#E8EBF4]">
                <div class="flex gap-4">
                  <div id="icon-ritmo" class="shrink-0"></div>

                  <div>
                    <span
                      id="label-ritmo"
                      class="accent text-[18px] font-semibold tracking-[0.07em]"
                      >RITMO</span
                    >
                    <div
                      id="val-ritmo"
                      class="text-[22px] font-semibold text-navy leading-snug"
                    ></div>
                  </div>
                </div>
              </div>

              <!-- Lugar -->
              <div
                class="px-[26px] py-[22px] border-r border-b border-[#E8EBF4]"
              >
                <div class="flex gap-4">
                  <svg
                    class="shrink-0 stroke-navy"
                    width="56"
                    height="56"
                    viewBox="0 0 512 512"
                    fill="none"
                    stroke-width="32"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <path
                      d="M256 48c-79.5 0-144 61.39-144 137 0 87 96 224.87 131.25 272.49a15.77 15.77 0 0025.5 0C304 409.89 400 272.07 400 185c0-75.61-64.5-137-144-137z"
                    />
                    <circle cx="256" cy="192" r="48" />
                  </svg>

                  <div>
                    <span
                      class="accent text-[18px] font-semibold tracking-[0.07em]"
                      >LUGAR</span
                    >
                    <div
                      id="val-lugar"
                      class="text-[22px] font-semibold text-navy leading-snug"
                    ></div>
                  </div>
                </div>
              </div>

              <!-- Inscripción -->

              <div class="px-[26px] py-[22px] border-b border-[#E8EBF4]">
                <div class="flex gap-4">
                  <svg
                    class="shrink-0 stroke-navy"
                    width="56"
                    height="56"
                    viewBox="0 0 512 512"
                    fill="none"
                    stroke-width="32"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <rect
                      x="32"
                      y="80"
                      width="448"
                      height="256"
                      rx="16"
                      ry="16"
                      transform="rotate(180 256 208)"
                      fill="none"
                      class="stroke-navy"
                      strokeLinejoin="round"
                      strokeWidth="32"
                    />
                    <path
                      fill="none"
                      class="stroke-navy"
                      strokeLinecap="round"
                      strokeLinejoin="round"
                      strokeWidth="32"
                      d="M64 384h384M96 432h320"
                    />
                    <circle
                      cx="256"
                      cy="208"
                      r="80"
                      fill="none"
                      class="stroke-navy"
                      strokeLinecap="round"
                      strokeLinejoin="round"
                      strokeWidth="32"
                    />
                    <path
                      d="M480 160a80 80 0 01-80-80M32 160a80 80 0 0080-80M480 256a80 80 0 00-80 80M32 256a80 80 0 0180 80"
                      fill="none"
                      class="stroke-navy"
                      strokeLinecap="round"
                      strokeLinejoin="round"
                      strokeWidth="32"
                    />
                  </svg>

                  <div>
                    <span
                      class="accent text-[18px] font-semibold tracking-[0.07em]"
                      >INSCRIPCIÓN</span
                    >
                    <div
                      id="val-precio"
                      class="text-[22px] font-semibold text-navy leading-snug"
                    ></div>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <!-- /info card -->

          <!-- FOOTER -->
          <div
            class="text-center flex-1 flex flex-col items-center justify-center"
          >
            <div
              class="text-[15px] text-[#7A8499] font-medium tracking-[0.04em]"
            >
              MÁS INFORMACIÓN EN:
            </div>
            <div class="text-[31px] font-extrabold text-navy tracking-tight">
              ajedrezcostarica.com
            </div>
          </div>
        </div>
        <!-- /columna principal -->
      </div>
      <!-- /sección inferior -->

      <!-- ══════════════════════════════
       BADGE DE TIPO — superpuesto
  ══════════════════════════════ -->
      <div
        id="tipo-badge"
        class="absolute top-[594px] left-1/2 -translate-x-1/2 accent-bg rounded-lg h-[52px] px-7 flex items-center gap-[10px] whitespace-nowrap"
      >
        <div
          id="tipo-icon"
          class="w-6 h-6 flex items-center justify-center"
        ></div>
        <span
          id="tipo-label"
          class="text-white text-[21px] font-bold tracking-[0.10em]"
        ></span>
      </div>
    </div>
    <!-- /#flyer -->

    <script src="data.js"></script>
    <script src="theme.js"></script>
    <script src="render.js"></script>
  </body>
</html>
